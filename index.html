<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrollment Portal</title>
<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#e8edf5,#dfe6f2);
margin:0;
padding:15px;
overflow-x:hidden;
}

html,body{
width:100%;
overflow-x:hidden;
}

.card{
background:white;
width:100%;
max-width:420px;
margin:auto;
padding:16px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h3{
text-align:center;
margin-bottom:15px;
color:#0d1b66;
}

#formArea{
background:#f9fafc;
padding:14px;
border-radius:10px;
width:100%;
}

input,select{
width:100%;
padding:11px;
margin:6px 0;
border-radius:7px;
border:1px solid #d7dce5;
font-size:16px;
/* font-size:16px; */
line-height:1.4;
display:block;
}

button{
width:100%;
padding:12px;
background:#0d1b66;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#1c2e96;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.summary{
background:#f5f7fb;
padding:15px;
border-radius:10px;
margin-top:15px;
font-size:14px;
}

.summary div{
margin-top:6px;
}

.shareBtns{
margin-top:12px;
display:flex;
gap:10px;
}

.whatsapp{background:#25D366;}
.sms{background:#0d1b66;}

#historyBox{
display:none;
margin-top:18px;
text-align:center;
}

#historyList{
padding:0;
margin:0;
list-style:none;
max-height:300px;
overflow-y:auto;
}

.history-item{
background:#f1f3f8;
padding:14px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
text-align:center;
transition:.2s;
}

.history-item:hover{
background:#e7ebf5;
}

.history-item b{
display:block;
font-size:15px;
color:#0d1b66;
}

.history-item span{
font-size:13px;
color:#555;
}

.history-time{
font-size:11px;
color:#777;
margin-top:3px;
}

#classArea{
max-height:250px;
overflow-y:auto;
width:100%;
}

#classArea input{
width:100%;
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#0d1b66;
color:white;
padding:12px 20px;
border-radius:8px;
opacity:0;
transition:.3s;
}

#toast.show{
opacity:1;
}

.footer{
text-align:center;
margin-top:15px;
font-size:11px;
color:#666;
}

.lang-row{
display:flex;
gap:6px;
align-items:center;
}

.lang-add{
width:34px;
height:34px;
border-radius:6px;
padding:0;
font-size:18px;
background:#0d1b66;
color:white;
border:none;
cursor:pointer;
}

#selectedLanguages{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:6px;
}

.lang-chip{
background:#eef1fb;
padding:5px 8px;
border-radius:6px;
font-size:12px;
display:flex;
align-items:center;
gap:5px;
}

.lang-chip span{
cursor:pointer;
font-weight:bold;
}

.lang-inputs{
display:flex;
gap:6px;
margin-top:6px;
}

.lang-inputs input{
flex:1;
}


</style>
</head>

<body>

<div class="card" id="loginBox">
<h3>Sales Rep Login</h3>
<input id="repId" placeholder="Rep ID">
<input id="repPin" type="password" placeholder="PIN">

    <small style="
    display:block;
    margin:8px 0 12px;
    padding:8px;
    background:#f5f7fa;
    border-radius:6px;
    color:#555;
    font-size:10px;
    text-align:center;">
    Please use the User ID and PIN assigned to you by the admin.
  </small>


<button id="loginBtn" onclick="login()">Login</button>
</div>

<div class="card" id="appBox" style="display:none">

<h3 id="formHeader">Register New School</h3>

<div id="formArea">

<input id="schoolName" placeholder="School Name">

<select id="region">
<option value="">Select Region</option>
<option>Greater Accra</option>
<option>Ashanti</option>
<option>Eastern</option>
<option>Central</option>
<option>Volta</option>
<option>Western</option>
<option>Western North</option>
<option>Northern</option>
<option>Upper East</option>
<option>Upper West</option>
<option>Oti</option>
<option>Bono</option>
<option>Bono East</option>
<option>Ahafo</option>
<option>North East</option>
<option>Savannah</option>
</select>

<input id="location" placeholder="Location">

<input id="phone" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="10" placeholder="0509967235">

<div class="lang-row">
<select id="language">
<option value="">Select Ghanaian Language</option>
<option>Asante Twi</option>
<option>Akuapem Twi</option>
<option>Ga</option>
<option>Ewe</option>
<option>Fante</option>
<option>Dagbani</option>
<option>Dagaare</option>
<option>Dangme</option>
<option>Gonja</option>
<option>Kasem</option>
<option>Nzema</option>
</select>

<button type="button" class="lang-add" onclick="addLanguage()">+</button>
</div>

<div id="selectedLanguages"></div>
<div id="languageEnrollments"></div>
 <!-- FRENCH SELECTOR  -->
<select id="french">
<option value="No">French: No</option>
<option value="Yes">French: Yes</option>
</select>


<!-- PACKAGE SELECTOR -->
<select id="packageOption">
<option value="">Select Package Option</option>
<option value="A">Option A - Premium Pack</option>
<option value="B">Option B - General Pack</option>
<option value="C">Option C - Open Pack</option>
</select>

<select id="examType" onchange="toggleClasses()">
<option value="">Exam Type</option>
<option value="mock">Mock</option>
<!-- <option value="terminal">Terminal</option> -->
</select>

<div id="classArea"></div>

<button id="submitBtn" onclick="submitEnrollment()">Submit Enrollment</button>
<button onclick="reloadForm()">Reload / New Enrollment</button>
<button onclick="toggleHistory()">Show / Hide History</button>

</div>

<button id="addNewBtn" onclick="reloadForm()" style="display:none">Add New School</button>

<div id="summarySection" class="summary" style="display:none">
<h3>Bill Summary</h3>
<div id="summaryText"></div>

<div class="shareBtns">
<button class="whatsapp" onclick="shareWhatsApp()">Send Bill via WhatsApp</button>
<button class="sms" onclick="shareSMS()">Send Bill via SMS</button>
</div>
</div>

<div id="historyBox">
<h3>Submitted Schools</h3>
<ul id="historyList"></ul>
</div>

<div class="footer">
Registration Portal • Designed by Nick 
</div>

</div>

<div id="toast"></div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbzIQLnIrh_4k8Yd5T1rZF-XW3sriCdGPokev-iNwDyTjpv3VAasq2WZlqTIj2jSWYUb/exec";

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}



async function login(){

let btn=document.getElementById("loginBtn");
btn.disabled=true;
btn.innerText="Logging in...";

let rep=document.getElementById("repId").value;

try{

let res=await fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"login",
repId:rep,
pin:document.getElementById("repPin").value
})
});

let data=await res.json();

if(data.status==="ok"){

localStorage.setItem("token", data.token);

/* LOAD UI IMMEDIATELY */
loginBox.style.display="none";
appBox.style.display="block";

/* LOAD HISTORY PER REP */
loadHistory();

showToast("Login successful");

}else{
showToast("Invalid login");
}

}catch(err){
showToast("Connection error");
}

btn.disabled=false;
btn.innerText="Login";
}

function toggleClasses(){


    // RESET LANGUAGES WHEN EXAM TYPE CHANGES
selectedLangs=[];
document.getElementById("selectedLanguages").innerHTML="";
document.getElementById("languageEnrollments").innerHTML="";

let type=document.getElementById("examType").value;
let area=document.getElementById("classArea");
area.innerHTML="";

const classes=[["nursery","Nursery"],["kg1","KG1"],["kg2","KG2"],["b1","Basic 1"],["b2","Basic 2"],["b3","Basic 3"],["b4","Basic 4"],["b5","Basic 5"],["b6","Basic 6"],["b7","Basic 7"],["b8","Basic 8"],["b9","Basic 9"]];

if(type==="mock"){

document.getElementById("packageOption").disabled=false;

area.innerHTML=`<input type="tel" inputmode="numeric" pattern="[0-9]*" id="b9" placeholder="Basic 9 Enrollment">`;

}

if(type==="terminal"){

document.getElementById("packageOption").value="B";
document.getElementById("packageOption").disabled=true;

classes.forEach(c=>{
area.innerHTML+=`<input type="tel" inputmode="numeric" pattern="[0-9]*" id="${c[0]}" placeholder="${c[1]} Enrollment">`;
});

}
}

function calculateBill(e){

let total=0;

let categories={
"Preschool":((+e.nursery||0)+(+e.kg1||0)+(+e.kg2||0))*8,
"Lower Primary":((+e.b1||0)+(+e.b2||0)+(+e.b3||0))*9,
"Upper Primary":((+e.b4||0)+(+e.b5||0)+(+e.b6||0))*10,
"Basic 7 & 8":((+e.b7||0)+(+e.b8||0))*15
};

let b9=(+e.b9||0);

let option=document.getElementById("packageOption").value;

let price=20;
if(option==="A")price=60;
if(option==="B")price=20;
if(option==="C")price=15;

categories["Basic 9"]=b9*price;

for(let k in categories) total+=categories[k];

total+=20;

return {categories,total};
}

async function submitEnrollment() {
    if (!localStorage.getItem("token")) {
        showToast("Session expired");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Submitting...";

    const school = document.getElementById("schoolName").value.trim();
    const regionVal = document.getElementById("region").value;
    const locationVal = document.getElementById("location").value.trim();
    const phoneVal = document.getElementById("phone").value.trim();
    const exam = document.getElementById("examType").value;
    const frenchVal = document.getElementById("french").value;
    let packageVal = document.getElementById("packageOption").value;

    // VALIDATE REQUIRED FIELDS
    if (!school || !regionVal || !locationVal || !phoneVal || !exam || !frenchVal) {
        showToast("Fill all fields");
        btn.disabled = false;
        btn.innerText = "Submit Enrollment";
        return;
    }

    if (selectedLangs.length === 0) {
        showToast("Select at least one language");
        btn.disabled = false;
        btn.innerText = "Submit Enrollment";
        return;
    }

    if (exam === "mock" && !packageVal) {
        showToast("Select Option A, B or C for Mock");
        btn.disabled = false;
        btn.innerText = "Submit Enrollment";
        return;
    }

    if (exam === "terminal") {
        packageVal = "B"; // Force terminal to B
    }

    // COLLECT ENROLLMENTS
    const enrollments = {};
    document.querySelectorAll("#classArea input").forEach(i => {
        enrollments[i.id] = Number(i.value) || 0;
    });

 // HANDLE LANGUAGE VALUES
let languageVal = "";
const languageInputs = document.querySelectorAll("#languageEnrollments input");

if (exam === "mock") {

    if (selectedLangs.length === 0) {
        showToast("Select at least one language");
        btn.disabled=false;
        btn.innerText="Submit Enrollment";
        return;
    }

    let totalLang = 0;
    let langParts = [];

    for (let i = 0; i < selectedLangs.length; i++) {

        let raw = languageInputs[i] ? languageInputs[i].value.trim() : "";

        // ❌ EMPTY FIELD CHECK (this is the important fix)
        if (raw === "") {
            showToast("Enter enrollment for " + selectedLangs[i]);
            btn.disabled=false;
            btn.innerText="Submit Enrollment";
            return;
        }

        let val = Number(raw);

        // ❌ ZERO OR NEGATIVE CHECK
        if (val <= 0) {
            showToast("Enrollment must be greater than 0 for " + selectedLangs[i]);
            btn.disabled=false;
            btn.innerText="Submit Enrollment";
            return;
        }

        totalLang += val;
        langParts.push(`${selectedLangs[i]}(${val})`);
    }

    let mockTotal = (enrollments.b9 || 0);

// ❌ greater than mock
if (totalLang > mockTotal) {
    showToast(`Languages must total ${mockTotal}`);
    btn.disabled=false;
    btn.innerText="Submit Enrollment";
    return;
}

// ❌ less than mock
if (totalLang < mockTotal) {
    showToast(`Languages must total ${mockTotal}`);
    btn.disabled=false;
    btn.innerText="Submit Enrollment";
    return;
}
    languageVal = langParts.join(", ");

} else {
    languageVal = selectedLangs.join(", ");
}

    // CALCULATE BILL
    const bill = calculateBill(enrollments);
    const submissionId = window.currentSubmissionId || Date.now();

    // BUILD SUMMARY HTML
    let summaryHTML = `<div><b>School:</b> ${school}</div><hr>`;
    for (let c in bill.categories) {
        summaryHTML += `<div>${c}: GHS ${bill.categories[c]}</div>`;
    }
    summaryHTML += `<hr><b>Total: GHS ${bill.total}</b>`;

    const summarySection = document.getElementById("summarySection");
    const summaryText = document.getElementById("summaryText");
    summaryText.innerHTML = summaryHTML;
    summaryText.dataset.school = school;
    summarySection.style.display = "block";
    summarySection.scrollIntoView({ behavior: "smooth" });

    // CLEAR FORM IMMEDIATELY
    reloadForm(false);

    btn.disabled = false;
    btn.innerText = "Submit Enrollment";

    // SEND TO SERVER IN BACKGROUND
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
            action: "submit",
            token: localStorage.getItem("token"),
            submissionId,
            school,
            region: regionVal,
            location: locationVal,
            phone: phoneVal,
            language: languageVal,
            french: frenchVal,
            examType: exam,
            packageOption: packageVal,
            enrollments,
            totalBill: bill.total
        }),
        keepalive: true
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") showToast("Enrollment submitted");
    })
    .catch(() => showToast("Server connection failed"));

    // SAVE HISTORY LOCALLY
    const rep = localStorage.getItem("repId");
    const historyKey = "history_" + rep;
    const history = JSON.parse(localStorage.getItem(historyKey) || "[]");

    history.push({
        submissionId,
        school,
        region: regionVal,
        location: locationVal,
        phone: phoneVal,
        language: languageVal,
        french: frenchVal,
        examType: exam,
        packageOption: packageVal,
        enrollments,
        time: new Date().toLocaleString()
    });

    if (history.length > 50) history.shift();
    localStorage.setItem(historyKey, JSON.stringify(history));
    loadHistory();
}

function loadHistory(){

let list=document.getElementById("historyList");
list.innerHTML="";

let rep = localStorage.getItem("repId");
let historyKey = "history_"+rep;
let history=JSON.parse(localStorage.getItem(historyKey)||"[]");

[...history].reverse().forEach(d=>{

let li=document.createElement("li");

li.className="history-item";

li.onclick=function(){ editSchool(d); };

li.innerHTML=`
<b>${d.school}</b>
<span>${d.region}</span>
<div class="history-time">${d.time}</div>
`;

list.appendChild(li);

});

}
function editSchool(data){

window.currentSubmissionId = data.submissionId;

document.getElementById("historyBox").style.display="none";

document.getElementById("schoolName").value=data.school;
document.getElementById("region").value=data.region;
document.getElementById("location").value=data.location;
document.getElementById("phone").value=data.phone;
document.getElementById("language").value=data.language;
document.getElementById("french").value=data.french;
document.getElementById("examType").value=data.examType;

toggleClasses();

setTimeout(()=>{

for(let k in data.enrollments){
let el=document.getElementById(k);
if(el) el.value=data.enrollments[k];
}

},200);

window.scrollTo({top:0,behavior:"smooth"});
}



function toggleHistory(){

/* HIDE SUMMARY */
document.getElementById("summarySection").style.display="none";

let box=document.getElementById("historyBox");
box.style.display=(box.style.display==="block"?"none":"block");
}

function reloadForm(hideSummary = true){

window.currentSubmissionId = null;

/* CLEAR FORM */
document.querySelectorAll("#formArea input").forEach(i=>i.value="");
document.querySelectorAll("#formArea select").forEach(s=>s.selectedIndex=0);
document.getElementById("classArea").innerHTML="";

/* RESET DISABLED STATES */
document.getElementById("packageOption").disabled = false;

/* ✅ CONTROL SUMMARY VISIBILITY */
if(hideSummary){
document.getElementById("summarySection").style.display = "none";
}

// CLEAR LANGUAGES
selectedLangs = [];
document.getElementById("selectedLanguages").innerHTML = "";
document.getElementById("languageEnrollments").innerHTML = "";
}

function shareWhatsApp(){

let school = document.getElementById("summaryText").dataset.school;
let message = buildMessage(school);

window.open(`https://wa.me/?text=${encodeURIComponent(message)}`);
}

function shareSMS(){

let school = document.getElementById("summaryText").dataset.school;
let message = buildMessage(school);

window.open(`sms:?body=${encodeURIComponent(message)}`);
}

function buildMessage(school){

let text = summaryText.innerText;

return `School Name: ${school}

${text}

Kindly pay through this momo line 
0247448883(Bacon Atsu Amengor / Best Brain Examinations Konsortium) 

NB: Please use the name of your school as reference when making payments and send us a screenshot for confirmation.`;
}

document.addEventListener("focusin", function(e){
if(e.target.tagName === "INPUT" || e.target.tagName === "SELECT"){
setTimeout(()=>{
e.target.scrollIntoView({behavior:"smooth", block:"center"});
},300);
}
});



let selectedLangs = [];

function addLanguage(){

let select = document.getElementById("language");
let val = select.value;

if(!val) return;
if(selectedLangs.includes(val)) return;

selectedLangs.push(val);
select.value="";

renderLanguages();
}

function removeLanguage(lang){
selectedLangs = selectedLangs.filter(l => l !== lang);
renderLanguages();
}

function renderLanguages(){
    let chipBox = document.getElementById("selectedLanguages");
    let inputBox = document.getElementById("languageEnrollments");

    chipBox.innerHTML = "";
    inputBox.innerHTML = "";

    let wrapper = document.createElement("div");
    wrapper.className = "lang-inputs";

    selectedLangs.forEach(lang => {
        // Show chip
        chipBox.innerHTML += `
        <div class="lang-chip">
            ${lang} <span onclick="removeLanguage('${lang}')">×</span>
        </div>`;

        // Always show an enrollment input for every selected language
        let input = document.createElement("input");
      input.type = "number";
input.min = "1";
input.required = true;
        input.placeholder = `${lang} enrollment`;
        input.inputMode = "numeric";
        input.pattern = "[0-9]*";
        wrapper.appendChild(input);
    });

    inputBox.appendChild(wrapper);
}



</script>

</body>
</html>
